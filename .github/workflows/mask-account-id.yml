name: Test mask-account-id

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service name
        required: true
      image:
        description: Image name
        required: true
  push:
    branches:
      - test-branch
    paths:
      - '.github/workflows/mask-account-id.yml'

jobs:
  test-masking:
    runs-on: ubuntu-latest
    environment: qa-aws
    strategy:
      matrix:
        mask_value:
          - value: ""
            label: "unset (default)"
          - value: "true"
            label: "true"
          - value: "yes"
            label: "yes"
          - value: "Yes"
            label: "Yes"
          - value: "YES"
            label: "YES"
          - value: "false"
            label: "false"
          - value: "no"
            label: "no"

    env:
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
      DUPLO_HOST: "https://qa-aws.duplocloud.net"
      DUPLO_TENANT: "gittests"

    steps:
      - name: Setup Node24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Duplo Setup AWS - ${{ matrix.mask_value.label }}
        uses: duplocloud/actions@v0.0.14
        with:
          region: us-east-2
          mask-account-id: ${{ matrix.mask_value.value }}

      - name: Check Account ID Visibility - ${{ matrix.mask_value.label }}
        run: |
          echo "Testing mask-account-id: ${{ matrix.mask_value.label }}"
          aws sts get-caller-identity
        
