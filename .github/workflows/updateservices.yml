name: Update Service using update-image
on:
  push:
    branches:
      - master # branch to trigger on

jobs:
  update_service:
    name: Update Service
    runs-on: ubuntu-latest
    environment: 
      name: perf
    env:
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
      DUPLO_HOST: https://perf.duplocloud.net
      DUPLO_TENANT: qaperf-1-80	
    steps: 
    
    # install and login to the cloud
    - name: Duplo Setup
      uses: duplocloud/actions@v0.0.13

    # uses duploctl from above
    - name: Update Service
      uses: duplocloud/actions/update-image@v0.0.5
      with:
        name: serv1
        image: nginx:123
        type: service

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-west-2     

    - name: Update Multiple Images
      uses: duplocloud/actions/update-images@v0.0.13
      with:
        services: |
          [
             
            {
              "service": "serv1",
              "image": "myregistry/frontend:v1.2.3"
            }
          
          ]

  

        
