name: Build and Deploy
on:
  push:
    branches:
      - master # branch to trigger on
  workflow_dispatch:
    inputs:
      environment:
        description: The environment to deploy to
        type: environment
        default: qaperf-1-80
        required: true
      image:
        description: The full image
        type: string
        required: true

jobs:
  update_service:
    name: Update Service
    runs-on: ubuntu-latest
    environment: 
      name: ${{ inputs.environment }}
    env:
      DUPLO_TOKEN: ${{ secrets.DUPLO_TOKEN }}
      DUPLO_HOST: https://perf.duplocloud.net
      DUPLO_TENANT: qaperf-1-80	
    steps: 
    
    # install and login to the cloud
    - name: Duplo Setup
      uses: duplocloud/actions@v0.0.13

    # uses duploctl from above
    - name: Update Service
      uses: duplocloud/actions/update-image@v0.0.5
      with:
        name: serv1
        image: nginx:123
        type: service

    - name: Update Multiple Images
      uses: duplocloud/actions/update-images@v0.0.13
      with:
        services: |
          [
             [
            {
              "service": "serv1",
              "image": "myregistry/frontend:v1.2.3"
            },
            {
              "service": "serv2",
              "image": "myregistry/backend:latest"
            },
            {
              "service": "serv3",
              "image": "myregistry/backend:latest"
            }
            ,
            {
              "service": "s1tzou",
              "image": "myregistry/backend:latest"
            }
             ,
            {
              "service": "s1qets",
              "image": "myregistry/backend:latest"
            }
             ,
            {
              "service": "s1yhtj",
              "image": "myregistry/backend:latest"
            }
             ,
            {
              "service": "s1wkid",
              "image": "myregistry/backend:latest"
            }
             ,
            {
              "service": "s1dibj",
              "image": "myregistry/backend:latest"
            }
             ,
            {
              "service": "s1ygub",
              "image": "myregistry/backend:latest"
            },
             
            {
              "service": "s1vevb",
              "image": "myregistry/backend:latest"
            },
             
            {
              "service": "s1fedk",
              "image": "myregistry/backend:latest"
            },
             
            {
              "service": "s1qijq",
              "image": "myregistry/backend:latest"
            },
             
            {
              "service": "nginx1",
              "image": "myregistry/backend:latest"
            }
            ,
             
            {
              "service": "nginx2",
              "image": "myregistry/backend:latest"
            },
             
            {
              "service": "nginx3",
              "image": "myregistry/backend:latest"
            }
          ]
          ]


        
